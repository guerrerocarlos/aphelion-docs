name: Deploy Docusaurus

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          DOCUSAURUS_URL: https://${{ github.repository_owner }}.w7s.cloud
          DOCUSAURUS_BASE_URL: /${{ github.event.repository.name }}/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build

  deploy-github-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5

  deploy-w7s:
    environment:
      name: w7s
      url: https://${{ github.repository_owner }}.w7s.cloud/${{ github.event.repository.name }}/
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download GitHub Pages artifact
        uses: actions/download-artifact@v6
        with:
          name: github-pages
          path: w7s-artifact

      - name: Prepare W7S package
        run: |
          mkdir -p w7s-package/build
          tar -xf w7s-artifact/artifact.tar -C w7s-package/build
          test -f w7s-package/build/index.html

      - name: Deploy to W7S
        uses: w7s-io/w7s-cloud@v1
        with:
          token: ${{ github.token }}
          working-directory: w7s-package
          usage-warnings-issue: false
